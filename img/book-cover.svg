<svg xmlns="http://www.w3.org/2000/svg" width="440" height="250" viewBox="0 0 440 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7048e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7048e8;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="250" fill="url(#bg)" rx="8"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="440" height="4" fill="url(#accent)" rx="2"/>

  <!-- VPN shield + lock icon -->
  <g transform="translate(35, 55)">
    <!-- Shield outline -->
    <path d="M40,0 L75,12 L75,45 C75,65 60,82 40,92 C20,82 5,65 5,45 L5,12 Z"
          fill="none" stroke="url(#shield)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Lock body inside shield -->
    <rect x="28" y="42" width="24" height="20" rx="3" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <!-- Lock shackle -->
    <path d="M33,42 L33,34 C33,28 36,25 40,25 C44,25 47,28 47,34 L47,42"
          fill="none" stroke="#a78bfa" stroke-width="2"/>
    <!-- Lock keyhole -->
    <circle cx="40" cy="50" r="2" fill="#a78bfa"/>
    <line x1="40" y1="52" x2="40" y2="56" stroke="#a78bfa" stroke-width="2"/>
    <!-- Protocol dots below shield -->
    <circle cx="20" cy="108" r="3" fill="#0d6efd" opacity="0.8"/>
    <circle cx="40" cy="108" r="3" fill="#f59f00" opacity="0.8"/>
    <circle cx="60" cy="108" r="3" fill="#7048e8" opacity="0.8"/>
  </g>

  <!-- WHMCS badge -->
  <g transform="translate(140, 68)">
    <rect x="0" y="0" width="85" height="32" rx="6" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="42" y="21" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd" text-anchor="middle">WHMCS</text>
  </g>

  <!-- Module title -->
  <text x="240" y="75" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="start">PUQ VPNcp</text>
  <text x="240" y="108" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="start">Module</text>

  <!-- Subtitle -->
  <text x="240" y="135" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="start">WHMCS Server Module</text>

  <!-- Divider -->
  <rect x="240" y="148" width="60" height="2" fill="#7048e8" rx="1"/>

  <!-- Description -->
  <text x="240" y="172" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start">Multi-protocol VPN account provisioning</text>
  <text x="240" y="188" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start">WireGuard • OpenVPN • IKEv2</text>

  <!-- PUQ Cloud branding -->
  <g transform="translate(30, 210)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#7048e8">PUQ</text>
    <text x="55" y="15" font-family="Arial, sans-serif" font-size="12" fill="#64748b">cloud</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(370, 218)">
    <rect x="0" y="0" width="45" height="20" rx="4" fill="#7048e8" opacity="0.2" stroke="#7048e8" stroke-width="1"/>
    <text x="22" y="14" font-family="Arial, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">v1.0</text>
  </g>
</svg>
